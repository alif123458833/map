<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peta SMKAHMY Bakri Batu 2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#ff8800,#ffb347);
  min-height:100vh;
  text-align:center;
  color:white;
}

header{
  padding:22px;
  font-size:34px;
  font-weight:bold;
  text-shadow:2px 2px 6px rgba(0,0,0,0.3);
}

#map{
  height:72vh;
  width:92%;
  margin:auto;
  border-radius:20px;
  border:5px solid white;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.buttons{
  margin:25px;
}

button{
  background:#0066ff;
  color:white;
  border:none;
  padding:14px 26px;
  margin:10px;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#003faa;
  transform:scale(1.05);
}
</style>
</head>
<body>

<header>🗺️ SMKAHMY BAKRI BATU 2</header>

<div id="map"></div>

<div class="buttons">
  <button onclick="map.zoomIn()">➕ Zoom In</button>
  <button onclick="map.zoomOut()">➖ Zoom Out</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Lokasi Bakri Batu 2, Muar Johor
var map = L.map('map').setView([2.0615, 102.5940], 15);

// Peta
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

// Marker sekolah
L.marker([2.0615, 102.5940])
.addTo(map)
.bindPopup("<b>SMKAHMY</b><br>Bakri Batu 2, Muar Johor")
.openPopup();
</script>

</body>
</html>
